# Connexus Drop-Off - Add New RX Workflow
# Application: Walmart Connexus Pharmacy System
# Screen: Drop-Off
# Purpose: Add a new prescription to a patient order
# Created: 2024-11-02
# Platform: Windows

workflow:
  name: "Connexus Drop-Off - Add New RX"
  description: "Complete workflow for adding a new prescription to a patient's drop-off order"
  application: "Connexus"
  screen: "Drop-Off"
  
metadata:
  platform: "Windows"
  automation_method: "Hybrid (Accessibility + OCR + Keyboard)"
  estimated_duration: "30-45 seconds"
  
variables:
  # User-configurable values - change these for different executions
  patient_search_term:
    description: "Patient name or identifier to search"
    example: "john"
    type: "string"
    required: true
    
  bag_number:
    description: "Four-digit barcode/bag number (must be unique per day)"
    example: "9877"
    type: "string"
    pattern: "^[0-9]{4}$"
    required: true
    note: "Must not be a duplicate of any bag number used today"
    
  rx_origin_type:
    description: "Origin type of the prescription"
    default: "ORIGINAL RX"
    type: "dropdown"
    options:
      - "ORIGINAL RX"
      - "NO ASSOCIATED PRESCRIPTION"
      - "Other options available in dropdown"
    required: true
    
  priority:
    description: "Order priority level"
    default: "In-Store"
    type: "dropdown"
    options:
      - "In-Store"
      - "Today"
      - "Dr Call In"
      - "Other options available in dropdown"
    required: true

keyboard_shortcuts:
  alt_y:
    description: "Confirm barcode verification (Yes button)"
    dialog: "Verify Barcode"
    keys: ["alt", "y"]
    
  alt_a:
    description: "Accept RX Origin Type selection"
    dialog: "RX Origin Type"
    keys: ["alt", "a"]
    
  ctrl_a:
    description: "Select all text in field"
    usage: "Used before typing in dropdowns for quick selection"
    keys: ["ctrl", "a"]

elements:
  rx_number_name_field:
    description: "Main search field for patient lookup"
    label: "Rx Number/Name"
    control_type: "Edit"
    coordinates:
      x: 400
      y: 140
    locator_strategy: "OCR label + offset"
    
  scan_new_rx_button:
    description: "Button to initiate new RX entry"
    text: "Scan New RX"
    coordinates:
      x: 545
      y: 255
    locator_strategy: "OCR text"
    components:
      - text: "Scan"
        y: 241
      - text: "New"
        y: 265
      - text: "RX"
        y: 265
        
  barcode_input_field:
    description: "Input field for manual barcode entry"
    label: "Please Enter the four-digit BarCode number from the label"
    coordinates:
      x: 750
      y: 63
    locator_strategy: "OCR label + offset"
    
  patient_not_present_button:
    description: "Button in validation dialog to skip patient verification"
    text: "Patient Not Present"
    coordinates:
      x: 900
      y: 720
    locator_strategy: "VQA + coordinates"
    dialog: "Validate Patient Information"
    color: "red"
    position: "bottom-right"
    
  priority_dropdown:
    description: "Dropdown for order priority selection"
    label: "Priority"
    coordinates:
      x: 241
      y: 623
    locator_strategy: "OCR label + offset"
    selection_method: "Type first letter + Enter"
    
  accept_button:
    description: "Submit button at bottom of page"
    text: "Accept"
    coordinates:
      x: 825
      y: 709
    locator_strategy: "OCR text"

steps:
  - step: 1
    action: "Search for patient"
    description: "Enter patient search term in Rx Number/Name field"
    element: "rx_number_name_field"
    operations:
      - click:
          x: 400
          y: 140
      - wait: 0.2
      - type: "${patient_search_term}"
      - press_key: "enter"
      - wait: 1.0
    success_indicator: "Patient search dialog appears"
    
  - step: 2
    action: "Select patient from search results"
    description: "Press Enter to select the highlighted patient"
    operations:
      - press_key: "enter"
      - wait: 0.5
    success_indicator: "Validation dialog appears"
    notes:
      - "This selects the default/first highlighted patient in the list"
      - "Search returns 93+ results for 'john'"
      
  - step: 3
    action: "Handle validation dialog"
    description: "Click 'Patient Not Present' to bypass validation"
    dialog: "Validate Patient Information"
    element: "patient_not_present_button"
    operations:
      - click:
          x: 900
          y: 720
      - wait: 0.5
    success_indicator: "Returns to Drop-Off screen with patient loaded"
    alternative_buttons:
      - "Update Patient Profile" (gray, left)
      - "Wrong Patient Initiate New Search" (yellow, center)
      
  - step: 4
    action: "Click Scan New RX button"
    description: "Initiate new prescription entry"
    element: "scan_new_rx_button"
    operations:
      - click:
          x: 545
          y: 255
      - wait: 0.5
    success_indicator: "Barcode reader error dialog appears"
    
  - step: 5
    action: "Enter bag number"
    description: "Manually enter the four-digit barcode number"
    dialog: "BarCode Reader Error"
    element: "barcode_input_field"
    operations:
      - click:
          x: 750
          y: 63
      - wait: 0.2
      - type: "${bag_number}"
      - press_key: "enter"
      - wait: 0.5
    validation:
      pattern: "^[0-9]{4}$"
      error_handling:
        duplicate_barcode:
          error_message: "This Prescription (Barcode: XXXX) has already been scanned today"
          action: "Use a different bag number"
          
  - step: 6
    action: "Confirm barcode"
    description: "Verify the entered barcode is correct"
    dialog: "Verify Barcode"
    message: "You Entered Bar Code ${bag_number}. Is This correct?"
    operations:
      - hotkey: ["alt", "y"]  # Press Alt+Y for Yes
      - wait: 0.5
    success_indicator: "RX Origin Type dialog appears"
    notes:
      - "Alt+Y is keyboard shortcut for Yes button"
      - "Clicking Accept button on main screen does NOT work for this dialog"
      
  - step: 7
    action: "Set RX Origin Type"
    description: "Select the prescription origin type"
    dialog: "RX Origin Type"
    default_value: "NO ASSOCIATED PRESCRIPTION"
    target_value: "${rx_origin_type}"
    operations:
      - click:
          x: 706
          y: 333
      - wait: 0.3
      - type: "${rx_origin_type}"
      - wait: 0.3
      - hotkey: ["alt", "a"]  # Press Alt+A to Accept
      - wait: 0.5
    success_indicator: "Returns to Drop-Off screen with RX added to order"
    notes:
      - "Alt+A is keyboard shortcut for Accept button"
      - "Typing filters the dropdown to matching items"
      
  - step: 8
    action: "Set priority"
    description: "Set the order priority level"
    element: "priority_dropdown"
    current_value: "Today" (may vary)
    target_value: "${priority}"
    operations:
      - click:
          x: 241
          y: 623
      - wait: 0.2
      - select_all  # Ctrl+A
      - type: "i"  # First letter of "In-Store"
      - wait: 0.3
      - press_key: "enter"  # Do NOT press down arrow
      - wait: 0.3
    success_indicator: "Priority field shows '${priority}'"
    notes:
      - "Type first letter to jump to matching items"
      - "Press Enter immediately - down arrow will select wrong item"
      - "Ctrl+A + type letter is faster than arrow navigation"
      
  - step: 9
    action: "Submit order"
    description: "Click Accept button to save the RX to the order"
    element: "accept_button"
    operations:
      - click:
          x: 825
          y: 709
      - wait: 0.5
    success_indicator: "Order is saved and RX appears in order list"

error_handling:
  duplicate_barcode:
    dialog: "Duplicate Bar Code"
    message: "This Prescription (Barcode: XXXX) has already been scanned today"
    action: "Replace the existing Barcode with a new one and rescan"
    resolution:
      - "Press Enter or OK to close dialog"
      - "Click 'Scan New RX' button again"
      - "Use a different bag number (increment by 1)"
      - "Retry workflow from step 5"
      
  patient_deceased:
    dialog: "Patient Deceased"
    message: "Patient is marked as deceased"
    resolution:
      - "Close dialog with X button"
      - "Search for different patient"
      - "Or continue with 'Patient Not Present' option"

timing:
  wait_after_click: 0.2-0.5
  wait_after_typing: 0.3
  wait_after_dialog: 0.5-1.0
  total_workflow_duration: "30-45 seconds"
  
verification:
  step_1_verification:
    method: "Visual"
    indicator: "Patient search dialog with 93 records found"
    
  step_3_verification:
    method: "Visual"
    indicator: "Patient name 'JOHN, JOHN' visible on Drop-Off screen"
    
  step_7_verification:
    method: "Visual"
    indicator: "RX appears in prescription list on Drop-Off screen"
    
  final_verification:
    method: "Visual"
    indicators:
      - "RX with bag number ${bag_number} visible in order"
      - "Priority shows '${priority}'"
      - "RX Origin Type is '${rx_origin_type}'"

known_issues:
  - issue: "Duplicate bag numbers cause error"
    workaround: "Ensure bag number is unique for the day"
    
  - issue: "Some patients may be marked deceased"
    workaround: "Select a different patient or use 'Patient Not Present'"
    
  - issue: "Accessibility API doesn't expose Edit controls"
    workaround: "Use OCR + coordinate clicking for input fields"
    
  - issue: "Dropdown selection requires specific technique"
    workaround: "Use Ctrl+A + type first letter + Enter (no arrow keys)"

notes:
  - "This workflow was built in Building Mode with frequent user interaction"
  - "Keyboard shortcuts (Alt+Y, Alt+A) are more reliable than mouse clicks for dialogs"
  - "Typing in dropdowns auto-filters to matching items"
  - "Avoid using down arrow after typing in dropdowns - it shifts selection"
  - "Patient search returns many results - using Enter selects the default"
  - "Bag numbers must be unique per day in the system"
  - "Priority field location: below Order section, left of Date field"
  
workflow_mode: "Running Mode"
execution_style: "Autonomous with periodic progress updates"
user_interaction_required: false

version: "1.0"
last_updated: "2024-11-02"
author: "GUI Cub"
