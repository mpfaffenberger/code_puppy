# Workflow: New Patient Creation (Connexus)
# Tier: Keyboard-first with UIA validation, OCR for specific radio buttons
# Platform: Windows
# Last Updated: 2024-10-28
# Status: Functional - field validation verified, phone dialog handling confirmed

name: PatientCreation_NewPatient_v2
version: 2.0
tested_date: 2024-10-28

# CRITICAL: Do not change window focus after opening Search dialog
# Name field is preselected - type immediately without Tab

steps:
  - focus_connexus:
      window_title: "Wal*Mart Connexus"
      wait_seconds: 0.5
      note: "Focus main Connexus window - do NOT focus Search after opening"
  
  - open_patient_search:
      hotkey: ["ctrl", "shift", "p"]
      wait_seconds: 0.5
      window_appears: "Search"
      note: "Search dialog opens with Name field preselected"
  
  - fill_search_fields:
      # CRITICAL: Do NOT call desktop_focus_window after Search opens
      # Type directly - Name is preselected
      sequence:
        - field: "Last Name"
          automation_id: "Name" # verified via windows_get_focused_element
          value: "Testerson"
          method: "type_immediately" # no Tab needed, field is preselected
          verify: true
        
        - field: "DOB"
          automation_id: "mtbDOB" # verified
          value: "01021990" # format: MMDDYYYY
          method: "tab_then_type"
          verify: true
          expected_display: "01/02/1990" # masks format with slashes
        
        - field: "Phone"
          automation_id: "txtPatientPhone" # verified
          value: "1234567890" # 10 digits
          method: "tab_then_type"
          verify: true
      
      validation_strategy:
        - Before typing: windows_get_focused_element(pid=6988) to confirm field
        - After typing: windows_get_focused_element(pid=6988).value to verify
      
      timing:
        - wait_after_type: 0.02 # interval between keypresses
        - wait_between_fields: 0.1 # brief pause after Tab
  
  - alt_o_operation:
      hotkey: ["alt", "o"]
      wait_seconds: 0.3
      note: "Operation key - purpose unclear but required before Zip entry"
  
  - fill_zip:
      field: "Zip"
      automation_id: "txtZip" # verified
      value: "72712" # Bentonville, AR
      method: "tab_then_type"
      tab_count: 3 # from Phone field to Zip (skips intermediate fields)
      verify: true
      wait_seconds: 0.2
  
  - host_lookup:
      hotkey: ["alt", "h"]
      wait_seconds: 0.6
      auto_populates:
        - city: "Bentonville"
        - state: "AR"
      modal_handling:
        - window_title: "Additional Patient Information Needed"
          action: "press_enter"
          wait_after: 0.3
      note: "Host Look Up populates City/State from Zip; may trigger info modal"
  
  - open_patient_maintenance:
      hotkey: ["alt", "n"]
      wait_seconds: 0.7
      window_appears: "Patient Maintenance"
      note: "New button - only enabled after Host Look Up completes"
  
  - patient_maintenance_fill:
      window_title: "Patient Maintenance"
      pid: 6988
      
      required_fields:
        # STEP 1: Patient Type (CRITICAL - must be first)
        - field: "Patient Type"
          value: "HUMAN"
          method: "vqa_ocr_click" # VQA for coordinates, OCR as fallback
          coordinates:
            approximate: [137, 78] # window-relative, from VQA grid analysis
          ocr_fallback:
            search_text: "HUMAN"
            click_offset: [-20, 0] # radio button is left of text
          note: "CRITICAL: Must click HUMAN before Address field is enabled"
          validation:
            - Address field (txtAddressLine1) becomes enabled after selection
          wait_after: 0.3
        
        # STEP 2: First Name (required field)
        - field: "First Name"
          automation_id: "txtFirstName" # verified
          value: "John"
          method: "ocr_click_then_type"
          ocr_label: "Name" # second occurrence at x:235
          click_coords: [235, 140] # below the label
          verify: true
          note: "Field immediately after Last Name (which shows TESTERSON from search)"
          wait_after: 0.2
        
        # STEP 3: Gender
        - field: "Gender"
          value: "Male"
          method: "ocr_radio_click"
          ocr_search: "Male"
          click_offset: [-15, 0] # radio button is left of "Male" text
          coordinates: [120, 243] # approximate from OCR
          note: "Radio button group - Male/Female options"
          wait_after: 0.2
        
        # STEP 4: Address Line 1 (enables Save button)
        - field: "Address Line 1"
          automation_id: "txtAddressLine1" # verified
          value: "123 Main Street"
          method: "ocr_click_then_type"
          ocr_label: "*Address"
          click_coords: [150, 345] # below the label
          verify: true
          note: "CRITICAL: Alt+A (Save) only enabled after this field is filled"
          wait_after: 0.2
        
        # STEP 5 & 6: City/State (auto-populated from Host Look Up)
        - field: "City"
          value: "Bentonville" # auto-populated
          method: "verify_only"
          note: "Auto-filled by Host Look Up - do not type"
        
        - field: "State"
          value: "AR" # auto-populated
          method: "verify_only"
          note: "Auto-filled by Host Look Up - do not type"
        
        # STEP 7: Allergies
        - field: "Allergies"
          value: "No"
          method: "ocr_radio_click"
          ocr_region:
            x: 580
            y: 540
            width: 200
            height: 30
          ocr_search: "No" # within region near *Allergies label
          click_coords: [679, 554] # from OCR "OnNo" detection
          note: "Radio button group - Yes/No/Patient Not Present"
          wait_after: 0.2
        
        # STEP 8: Medical Conditions
        - field: "Medical Conditions"
          value: "No"
          method: "ocr_radio_click"
          ocr_region:
            x: 580
            y: 605
            width: 200
            height: 30
          ocr_search: "No" # within region near *Medical Conditions label
          click_coords: [679, 613] # from OCR "Ono" detection
          note: "Radio button group - Yes/No/Patient Not Present"
          wait_after: 0.2
  
  - save_and_close:
      hotkey: ["alt", "a"]
      wait_seconds: 1.0
      enabled_when: "Address Line 1 is filled"
      
      validation_dialog:
        window_title: "Validation"
        message: "Patient Phone Number has not been entered. Do you want to add?"
        radio_options: ["Yes", "No"]
        button: "OK"
        
        handling_sequence:
          - action: "press_right_arrow"
            note: "Right arrow from Yes (default selection)"
          - action: "press_right_arrow"
            note: "Right arrow again to select No radio button"
          - action: "press_enter"
            note: "Enter activates OK button and closes dialog"
          - wait_seconds: 1.0
        
        notes:
          - "No radio button has no tab index - arrow keys required"
          - "Two right arrows needed: Yes → intermediate state → No"
          - "Enter key activates OK button (default action)"
          - "Both Validation and Patient Maintenance windows close on success"
        
        verified: "2024-10-28 - Successfully tested and confirmed working"
        
        note: "Phone validation always appears; select No to skip phone entry"
  
  - verify_completion:
      expected_state:
        - "Patient Maintenance window may remain open (normal behavior)"
        - "Validation dialog should be closed"
        - "Patient data saved to database"
      
      success_indicators:
        - Validation dialog closes
        - No error dialogs appear
        - Patient Maintenance window persists (may require manual close)

# Field Automation IDs (Windows UI Automation)
automation_ids:
  search_dialog:
    last_name: "Name"
    dob: "mtbDOB"
    phone: "txtPatientPhone"
    zip: "txtZip"
  
  patient_maintenance:
    first_name: "txtFirstName"
    address_line1: "txtAddressLine1"
    # Patient Type, Gender, Allergies, Medical Conditions: no automation_id (radio groups)

# Timing Observations
timing:
  search_open: 0.5 # Ctrl+Shift+P to Search window visible
  host_lookup: 0.6 # Alt+H to city/state population
  patient_maintenance_open: 0.7 # Alt+N to window visible
  save_processing: 1.0 # Alt+A to validation dialog
  validation_close: 1.0 # OK click to dialog close

# Known Issues & Workarounds
known_issues:
  - issue: "UIA windows_get_focused_element fails intermittently on Search dialog"
    workaround: "Use process-only attach (pid=6988) without window_title parameter"
    severity: "medium"
  
  - issue: "Patient Type HUMAN radio button has no automation_id or tab index"
    workaround: "Use VQA for coordinate identification, OCR as fallback, click at [137, 78]"
    severity: "medium"
  
  - issue: "Gender, Allergies, Medical Conditions radio buttons not accessible via UIA"
    workaround: "Use OCR to find text labels, calculate radio button position (offset left)"
    severity: "medium"
  
  - issue: "Alt+N (New) disabled until Host Look Up (Alt+H) completes"
    workaround: "Always execute Alt+H before Alt+N, wait 0.6s for processing"
    severity: "low"
  
  - issue: "Address field disabled until Patient Type HUMAN is selected"
    workaround: "Always select HUMAN first, verify txtAddressLine1 becomes enabled"
    severity: "high"
    criticality: "BLOCKING - workflow fails if HUMAN not clicked first"

# OCR Strategies
ocr_strategies:
  human_radio:
    method: "VQA grid analysis preferred, OCR fallback"
    vqa_grid_coords: [137, 78]
    ocr_text: "HUMAN" or "Human"
    click_offset: "Radio button at identified coordinates"
  
  gender_radio:
    ocr_text: "Male"
    click_offset: [-15, 0] # left of text
    confidence_threshold: 0.85
  
  allergies_radio:
    ocr_text: "No"
    search_region: [580, 540, 200, 30]
    click_coords: [679, 554]
  
  medical_conditions_radio:
    ocr_text: "No"
    search_region: [580, 605, 200, 30]
    click_coords: [679, 613]

# Troubleshooting
troubleshooting:
  fields_not_filling:
    - "Verify Search dialog is focused (not terminal/shell)"
    - "Do NOT call desktop_focus_window after Search opens"
    - "Name field is preselected - type immediately"
    - "Use windows_get_focused_element(pid=6988) to confirm field before typing"
  
  address_field_disabled:
    - "Verify HUMAN radio button was clicked successfully"
    - "Check txtAddressLine1 automation_id is enabled via UIA"
    - "Wait 0.3s after HUMAN click before attempting Address entry"
  
  save_button_disabled:
    - "Verify Address Line 1 is filled (required to enable Alt+A)"
    - "Confirm all required fields have values"
  
  validation_dialog_stuck:
    - "Use Tab navigation: Tab → Space (select No) → Tab → Enter (OK)"
    - "Do not attempt direct click - coordinates vary"
    - "Wait 1.0s after Enter for dialog to close"

notes:
  - "Successfully tested end-to-end: 2024-10-28"
  - "Field validation via windows_get_focused_element confirmed working"
  - "OCR confined to radio buttons only - all text fields use keyboard input"
  - "Phone validation dialog handling verified with Tab/Space/Enter sequence"
  - "Patient Maintenance window persistence after save is normal behavior"
  - "CRITICAL: Never focus terminal/shell - always focus GUI application before OCR"
  - "VQA used only for HUMAN radio coordinate identification, not for direct clicks"
