# Workflow: Drop-Off (Connexus)
# Tier: Keyboard-first with UIA automation_ids
# Platform: Windows
# Last Updated: 2025-11-02
# Status: COMPLETED & TESTED - All steps validated in test environment

name: DropOff_OrderIntake_Complete_v1
version: 1.0

purpose: >
  Complete Drop-Off workflow: Navigate to Drop-Off screen, search/select patient,
  initiate new order via Scan New RX, set RX Origin Type to ORIGINAL RX, configure
  priority and ready by date, then accept to proceed to Input screen.

prerequisites:
  - connexus_running: true
  - user_logged_in: true
  - on_dropoff_screen: false  # Workflow will open Drop-Off with Ctrl+D

open_dropoff:
  description: Open Drop-Off screen if not already open
  hotkey: ["ctrl", "d"]
  wait_seconds: 0.7
  success_indicator: "Wal*Mart Connexus - [Drop-Off]"

locators:
  # From reference/OrderIntake.yaml (mapped to Connexus Drop-Off)
  dropoff:
    rx_number_name_field:
      element_id: connexus_dropoffpage_txtPatientRxNo
      automation_id: txtPatientRxNo
      description: Rx Number/Name input (topmost field)
      note: Keyboard entry works, automation_id click not tested
    
    scan_new_rx_button:
      element_id: connexus_dropoffpage_btnScanNewRx
      automation_id: btnScan
      description: Scan New RX button
      verified: true
      method: ui_click_element with automation_id
    
    rx_origin_type_dropdown:
      element_id: connexus_dropoffpage_cmbRxOrigin
      automation_id: cmbRxOrigin
      note: Automation_id not found, use keyboard typing instead
    
    priority_dropdown:
      element_id: connexus_dropoffpage_cmbPriority
      automation_id: cmbPriority
      description: Order priority selector
      verified: true
      method: ui_click_element with automation_id
      note: Element label shows "Order Comment" but works correctly
    
    ready_by_dropdown:
      element_id: connexus_dropoffpage_cmbReadyBy
      automation_id: cmbReadyBy
      description: Ready By date selector
      note: Automation_id not found, use Tab navigation + Down arrow
    
    accept_button:
      element_id: connexus_dropoffpage_btnAccept
      automation_id: btnAccept
      keyboard_shortcut: Alt+A
      description: Accept button on Drop-Off main page
      verified: true
      method: Alt+A keyboard shortcut (automation_id not found)
  
  dialogs:
    patient_validation:
      patient_not_present_button:
        element_id: connexus_dropoffpage_patientNotPresentButton
        automation_id: btnNotPresent
        keyboard_shortcut: Alt+P
        description: Patient Not Present button on Validate Patient Information dialog
        verified: true
        method: Alt+P keyboard shortcut (automation_id not found)
      note: Dialog title is "Validate Patient Information"
    
    verify_barcode:
      yes_button:
        element_id: connexus_dropoffpage_btnYesVerifyBarcode
        automation_id: "6"
        keyboard_shortcut: Enter
        description: Verify barcode confirmation
        verified: true
        method: Enter key
    
    rx_origin_type:
      accept_button:
        automation_id: btnAccept
        keyboard_shortcut: Alt+A
        description: Accept button on RX Origin Type dialog
        verified: true
        method: Alt+A keyboard shortcut
  
  priority_options:
    in_store:
      name: In-Store
      description: In-store pickup priority
    critical:
      element_id: connexus_dropoffpage_priorityCritical
      name: Critical
    today:
      element_id: connexus_dropoffpage_priorityToday
      name: Today

configuration:
  bag_number:
    description: 4-digit bag number entry for test env (randomized with retry)
    pattern: "\\d{4}"
    max_retries: 5
    example: "9876"
    note: In test environment, barcode scanner not available - manual entry required
  
  search_query:
    description: Text to search in Rx Number/Name field (patient name or RX number)
    default: "john"
    examples:
      - "john"
      - "smith"
      - "doe"
      - "12345"  # RX number
    note: Case-insensitive search
  
  rx_origin_choice:
    description: Origin type to select on RX Origin Type dialog
    required: true
    default: "ORIGINAL RX"
    options:
      - "ORIGINAL RX"
      - "TRANSFER RX"
      - "E-SCRIPT"
    method: keyboard_typing
    note: Type exact text to select from dropdown
  
  order_priority:
    description: Priority level for the order
    options:
      - "In-Store"  # Recommended for in-store pickup
      - "Critical"  # Urgent orders
      - "Today"     # Same-day fulfillment
      - "Standard"  # Normal priority
    default: "In-Store"
    method: keyboard_typing
    note: Type exact text after clicking cmbPriority dropdown
  
  ready_by_date:
    description: Ready By date for the order
    default: "today"  # Use Down arrow to select from list
    options:
      - "today"
      - "tomorrow"
      - "custom"  # Use Down arrow multiple times
    method: keyboard_navigation
    note: Tab to field, use Down arrow to select, press Enter

notes:
  - Validation dialog (Validate Patient Information) appears based on patient profile
  - Use Alt+P (Patient Not Present) to bypass validation dialog
  - In test environments, barcode scanner is not available - manual 4-digit bag number required
  - Duplicate bag number errors can occur - workflow includes retry logic
  - Verify Barcode confirmation accepts Enter key
  - RX Origin Type dropdown requires typing exact text (automation_id not accessible)
  - Priority dropdown works via automation_id cmbPriority
  - Ready By date uses Tab navigation + Down arrow (automation_id not accessible)
  - Alt+A is universal Accept shortcut for both RX Origin Type and main Drop-Off page
  - Alt+P closes validation dialog (Patient Not Present)
  - Window title changes from "[Drop-Off]" to base title after Accept

keyboard_shortcuts:
  ctrl_d: Open Drop-Off screen
  alt_p: Patient Not Present (validation dialog)
  alt_a: Accept (RX Origin Type dialog and main Drop-Off page)
  enter: Confirm selections, verify barcode, select dropdown items
  tab: Navigate between fields
  down: Navigate dropdown options for Ready By date
  ctrl_a: Select all text in field

steps:
  - step_id: 1
    name: ensure_dropoff_open
    description: Ensure Drop-Off screen is active
    action: keyboard_hotkey
    implementation:
      hotkey: ["ctrl", "d"]
      wait_seconds: 0.7
    verification:
      window_title_contains: "[Drop-Off]"
    status: TESTED ✅

  - step_id: 2
    name: search_patient_in_rx_number_name
    description: Enter search query in Rx Number/Name field and open Search
    action: keyboard_type
    implementation:
      type_text: "${configuration.search_query}"  # e.g., "john"
      wait_seconds: 0.3
      press: "enter"
      wait_seconds: 1.0
    result:
      opens_window: "Search"
    status: TESTED ✅
    notes:
      - Field auto-focuses after opening Drop-Off
      - Enter key opens Search dialog

  - step_id: 3
    name: select_first_search_result
    description: Select the first row in Search results
    action: keyboard_press
    implementation:
      press: "enter"
      wait_seconds: 1.0
    result:
      may_open: "Validate Patient Information"
    status: TESTED ✅

  - step_id: 4
    name: handle_validation_dialog
    description: Handle Validate Patient Information dialog with Patient Not Present
    action: keyboard_hotkey
    implementation:
      # Validation dialog appears for some patients
      hotkey: ["alt", "p"]  # Patient Not Present
      wait_seconds: 1.0
    verification:
      window_closed: "Validate Patient Information"
      active_window: "Wal*Mart Connexus - [Drop-Off]"
    status: TESTED ✅
    notes:
      - Alt+P is the keyboard shortcut for Patient Not Present button
      - automation_id btnNotPresent not accessible via UI automation
      - Dialog has three buttons: Update Patient Profile, Wrong Patient, Patient Not Present
      - Alt+P works even when button not in focus

  - step_id: 5
    name: click_scan_new_rx
    description: Click Scan New RX to add order to flow
    action: ui_click
    implementation:
      automation_id: btnScan
      wait_seconds: 1.0
    result:
      opens_window: "BarCode Reader Error"  # Expected in test environment
    status: TESTED ✅
    notes:
      - automation_id btnScan works reliably
      - Element label shows "   Scan New RX" (with leading spaces)

  - step_id: 6
    name: enter_bag_number
    description: Enter a 4-digit bag number in BarCode Reader Error dialog
    action: keyboard_type
    implementation:
      # In test environment, scanner not available
      type_text: "${configuration.bag_number}"  # e.g., "9876"
      wait_seconds: 0.3
      press: "enter"
      wait_seconds: 0.8
    result:
      may_open: "Duplicate Bag Number" # If number already used
      expected: "Verify Barcode" dialog
    status: TESTED ✅
    notes:
      - BarCode Reader Error dialog auto-focuses text field
      - If duplicate error occurs, press Escape and retry with different number
      - Tested with bag number 9876 successfully

  - step_id: 7
    name: verify_barcode_confirm
    description: Confirm Verify Barcode dialog
    action: keyboard_press
    implementation:
      press: "enter"
      wait_seconds: 0.8
    result:
      closes_window: "Verify Barcode"
      opens_window: "RX Origin Type"
    status: TESTED ✅
    notes:
      - Enter key confirms verification
      - automation_id "6" exists but Enter is simpler

  - step_id: 8
    name: select_rx_origin_type
    description: Select RX Origin Type by typing selection
    action: keyboard_type
    implementation:
      # Dropdown auto-focuses when dialog opens
      type_text: "${configuration.rx_origin_choice}"  # e.g., "ORIGINAL RX"
      wait_seconds: 0.5
    verification:
      dropdown_selection: "ORIGINAL RX"
    status: TESTED ✅
    notes:
      - automation_id cmbRxOrigin not accessible via UI automation
      - Typing exact text selects from dropdown (type-to-select)
      - Tested with "ORIGINAL RX" successfully

  - step_id: 9
    name: accept_rx_origin_type
    description: Accept RX Origin selection to proceed
    action: keyboard_hotkey
    implementation:
      hotkey: ["alt", "a"]  # Accept
      wait_seconds: 1.0
    result:
      closes_window: "RX Origin Type"
      returns_to: "Drop-Off main window"
    status: TESTED ✅
    notes:
      - Alt+A is keyboard shortcut for Accept button
      - automation_id btnAccept not accessible on this dialog
      - Works reliably even when button not in focus

  - step_id: 10
    name: set_order_priority
    description: Set priority for the order
    action: ui_click_and_type
    implementation:
      # Click Priority dropdown
      click:
        automation_id: cmbPriority
        wait_seconds: 0.3
      # Clear and type priority value
      keyboard:
        - hotkey: ["ctrl", "a"]  # Select all existing text
        - type_text: "${configuration.order_priority}"  # e.g., "In-Store"
        - press: "tab"  # Move to next field
        - wait_seconds: 0.3
    status: TESTED ✅
    notes:
      - automation_id cmbPriority works (element labeled "Order Comment")
      - Use Ctrl+A to clear existing selection before typing
      - Tested with "Today" and "In-Store" successfully
      - Tab key confirms selection and moves to next field

  - step_id: 11
    name: set_ready_by_date
    description: Set the Ready By date for the order
    action: keyboard_navigation
    implementation:
      # Priority field auto-tabs to next field after step 10
      # Tab to Ready By dropdown if needed
      keyboard:
        - press: "tab"  # Navigate to Ready By if not already there
          presses: 2
          wait_seconds: 0.2
        - press: "down"  # Navigate dropdown options
          wait_seconds: 0.3
        - press: "enter"  # Select option
          wait_seconds: 0.5
    status: TESTED ✅
    notes:
      - automation_id cmbReadyBy not accessible via UI automation
      - Tab navigation from Priority field works
      - Down arrow navigates date options
      - Enter confirms selection
      - Tested with default date selection successfully

  - step_id: 12
    name: accept_order
    description: Accept the order to proceed to Input screen
    action: keyboard_hotkey
    implementation:
      hotkey: ["alt", "a"]  # Accept
      wait_seconds: 1.0
    result:
      window_title_changes_to: "Wal*Mart Connexus"  # Removes "[Drop-Off]"
      proceeds_to: "Input screen"
    status: TESTED ✅
    notes:
      - Alt+A is universal Accept shortcut
      - automation_id btnAccept not accessible on main Drop-Off page
      - Window title changes from "[Drop-Off]" to base title
      - Successfully proceeds to Input/prescription entry screen

success_criteria:
  - Drop-Off screen opened successfully
  - Patient selected and loaded
  - Validation dialog handled (Alt+P)
  - Scan New RX initiated
  - Bag number entered and verified
  - RX Origin Type set to ORIGINAL RX
  - Priority set to configured value (e.g., In-Store)
  - Ready By date selected
  - Order accepted and proceeded to Input screen
  - Window title no longer shows "[Drop-Off]"

fallback_strategy:
  - If Rx Number/Name field not focusable: Press Tab or click near field label
  - If Search window not opening: Ensure Enter was pressed from field; retry once
  - If validation dialog persists: Use Alt+P (Patient Not Present) keyboard shortcut
  - If bag number duplicate: Press Escape, retry with different 4-digit number (max 5 retries)
  - If RX Origin Type not visible: Type exact text from configuration
  - If Accept not found: Use Alt+A keyboard shortcut
  - If automation_id not accessible: Use keyboard navigation (Tab, Enter, Alt+shortcuts)

automation_methods_used:
  keyboard_shortcuts:
    - Ctrl+D: Open Drop-Off
    - Alt+P: Patient Not Present
    - Alt+A: Accept (both RX Origin and main page)
    - Enter: Confirm selections
    - Tab: Navigate fields
    - Down: Navigate dropdowns
    - Ctrl+A: Select all text
  
  ui_automation:
    - btnScan: Scan New RX button (WORKS ✅)
    - cmbPriority: Priority dropdown (WORKS ✅)
  
  keyboard_navigation:
    - cmbRxOrigin: RX Origin Type dropdown (automation_id not accessible)
    - cmbReadyBy: Ready By dropdown (automation_id not accessible)
    - btnAccept: Accept button main page (automation_id not accessible)
    - btnNotPresent: Patient Not Present button (automation_id not accessible)

observations:
  - Ctrl+D reliably opens Drop-Off screen
  - Patient selection via Search Enter defaults to first row
  - Validation dialog is optional and patient-dependent
  - Alt+P (Patient Not Present) works without UI automation
  - Test env requires manual bag number entry; duplicate errors can occur
  - Verify Barcode accepts Enter key
  - Alt+A works universally for Accept buttons (RX Origin Type and main page)
  - Some automation_ids not accessible via UI automation (WindowsForms limitation)
  - Keyboard shortcuts more reliable than UI automation for this application
  - Priority dropdown automation_id works but shows confusing label
  - Ready By date requires keyboard navigation (Tab + Down arrow)
  - Window title change indicates successful progression to next screen

tested_scenarios:
  - Patient search: "john" → Success ✅
  - Validation dialog: Alt+P → Success ✅  
  - Bag number: "9876" → Success ✅
  - RX Origin: "ORIGINAL RX" → Success ✅
  - Priority: "Today" → Success ✅
  - Priority: "In-Store" → Success ✅
  - Ready By: Default date → Success ✅
  - Accept: Alt+A → Success ✅

example_usage:
  # Basic workflow with default configuration
  search_query: "john"
  bag_number: "9876"
  rx_origin_choice: "ORIGINAL RX"
  order_priority: "In-Store"
  ready_by_date: "today"
  
  # Alternative scenarios
  scenarios:
    - name: Critical priority order
      search_query: "smith"
      bag_number: "5432"
      rx_origin_choice: "ORIGINAL RX"
      order_priority: "Critical"
      ready_by_date: "today"
    
    - name: Transfer RX
      search_query: "doe"
      bag_number: "1111"
      rx_origin_choice: "TRANSFER RX"
      order_priority: "Today"
      ready_by_date: "tomorrow"
    
    - name: RX number search
      search_query: "12345"
      bag_number: "7890"
      rx_origin_choice: "ORIGINAL RX"
      order_priority: "In-Store"
      ready_by_date: "today"

