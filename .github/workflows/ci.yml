name: Quality Checks

on:
  pull_request:
    branches:
      - '**'

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ['3.11', '3.12', '3.13']
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        run: pip install uv

      - name: Setup uv virtual environment and install dependencies
        run: uv sync --group dev

      - name: Compile check
        run: uv run python -m compileall -q code_puppy tests

      - name: Lint with ruff
        run: uv run ruff check .

      - name: Check formatting with ruff
        run: uv run ruff format --check .

      - name: Run tests
        env:
          CI: '1'
          CODE_PUPPY_TEST_FAST: '1'
          CEREBRAS_API_KEY: 'fake-key-for-ci-testing'
          CONTEXT7_API_KEY: 'fake-key-for-ci-testing'
          OPENAI_API_KEY: 'fake-key-for-ci-testing'
          ANTHROPIC_API_KEY: 'fake-key-for-ci-testing'
          SYN_API_KEY: 'fake-key-for-ci-testing'
        run: |
          echo "Running unit tests (skipping integration tests) on ${{ runner.os }} with Python ${{ matrix.python-version }}..."
          uv run pytest tests/ --ignore tests/integration -v --cov=code_puppy --cov-report=term-missing
