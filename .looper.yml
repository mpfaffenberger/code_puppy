tools:
  - python: true

docker:
  - name: "python-agent"
    image: "docker.ci.artifacts.walmart.com/devtools-docker-prod-local/python-looper-agent:3.12-main"

envs:
  global:
    variables:
      BRANCH_NAME: ""
      BRANCH_NAME_LOWERCASE: ""
      BUILD_STATUS: ""
      COMMIT_USER: ""
      ALLOW_ARTIFACTORY: true

  build_success:
    variables:
      BUILD_STATUS: ":looper-green:"

  build_failed:
    variables:
      BUILD_STATUS: ":looper-red:"

rules:
  before:
    - var(BRANCH_NAME): '%{TRIGGER_BRANCH.replaceAll(".+/","")}'
    - var(BRANCH_NAME_LOWERCASE): "%{BRANCH_NAME.toLowerCase()}"
    - var(COMMIT_USER): git log -1 --format="%aN"

triggers:
  - push:
      ignoreMessage:
        - .+\*{3}NO_CI\*{3}.*
      ignoreAuthor:
        - jenkinspan
  - manual:
      name: manual_release
      call: manual_release()

flows:
  default:
    - node(docker-daemon):
        - dockerAgent(python-agent):
            - call: python_flow()

  manual_release:
    - node(docker-daemon):
        - dockerAgent(python-agent):
            - shell: pip install --index-url https://pypi.ci.artifacts.walmart.com/artifactory/api/pypi/external-pypi/simple pytest pytest-cov pytest-asyncio build bumpversion twine uv
            - shell: uv --native-tls venv
            - shell: uv --native-tls version --bump patch
            - shell: uv pip install --native-tls -e .
            - call: python_releaseSteps()
            - call: commitVersion()
            - call: slackBuildMessagePython()

  python_flow:
    - node(docker-daemon):
        - dockerAgent(python-agent):
            - shell: pip install --index-url https://pypi.ci.artifacts.walmart.com/artifactory/api/pypi/external-pypi/simple pytest pytest-cov pytest-asyncio build bumpversion twine uv
            - shell: uv --native-tls venv
            - shell: uv --native-tls version --bump patch
            - shell: uv pip install --native-tls -e .

  pr:
    - node(docker-daemon):
        - dockerAgent(python-agent):
            - shell: pip install --index-url https://pypi.ci.artifacts.walmart.com/artifactory/api/pypi/external-pypi/simple pytest pytest-cov pytest-asyncio build uv
            - shell: uv --native-tls venv
            - shell: uv pip install --native-tls -e .
            # - shell: uv --native-tls run pytest --cov-report=term-missing --cov-report=xml:coverage-reports/coverage.xml --cov=code_puppy --junitxml=pytest-reports/pytest-summary.xml
            - shell: uv --native-tls build

  python_releaseSteps:
    - shell: uv --native-tls build
    - shell: |
        VERSION=$(uv --native-tls run python -c "import code_puppy; print(code_puppy.__version__)")
        DEST="${REPOSOLNS_GENERIC_RELEASE_REPO}/code-puppy/$VERSION"
        echo "Uploading to: $DEST"
        echo "Auth user: $ARTIFACTORY_USER"
        for f in dist/*; do
          echo "--- Uploading $(basename $f) ---"
          curl --fail --show-error \
            --user "$ARTIFACTORY_USER:$ARTIFACTORY_PASSWORD" \
            --upload-file "$f" \
            "$DEST/$(basename $f)"
          echo "Uploaded OK: $(basename $f)"
        done

  commitVersion:
    - shell: git add pyproject.toml
    - shell: git commit -m "CI SKIP"
    - shell: git push origin $LOOPER_TARGET_BRANCH

  slackBuildMessagePython:
    - slack.postMessage:
        message: "*_Library Build_*\n
          code-puppy Python library\n
          *Branch*: ${GITHUB_BRANCH_NAME}\n
          *User*: ${COMMIT_USER}\n
          *Status*: ${BUILD_STATUS}"
        channelId: code-puppy-pipelines
