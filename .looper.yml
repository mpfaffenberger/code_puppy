# ============================================================================
# Code Puppy — LooperPro CI/CD Pipeline
# ============================================================================
# Standard Python build/release pipeline + portable venv distribution.
#
#   default / push  ->  python_flow              (build + bump version, no publish)
#   pr              ->  pr                       (build only, sanity check)
#   manual_release  ->  python_releaseSteps      (publish wheel to Artifactory)
#                       commitVersion            (commit bump back to repo)
#                       slackBuildMessagePython  (post to #code-puppy-pipelines)
#                       build_and_upload_windows_venv  (vs2022 agent)
#                       write_venv_latest_pointer      (atomic latest pointer)
#
# Portable venvs are uploaded to:
#   gs://puppy-pages/code-puppy-venv/<VERSION>/code-puppy-venv-windows.zip
#   gs://puppy-pages/code-puppy-venv/latest/version.txt   (just the version, no \n)
#
# Served back to clients by puppy-backend (separate repo) at:
#   GET /code-puppy-venv/version
#   GET /code-puppy-venv/download/{mac,windows}            (latest)
#   GET /code-puppy-venv/download/{mac,windows}/{version}  (pinned)
#
# Looper Pro API reference (for build logs, triggering, etc.):
#   Base URL : https://looperpro-cigateway.prod.walmart.com
#   Log viewer: https://looperpro.walmart.com/log/0?jobName={job}&buildNo={n}&...
#   Agent labels:
#     https://confluence.walmart.com/display/DXDOCS/14.+Agent+Types+and+Labels
#
# PREREQUISITES (one-time, manual):
#   1. Encrypt the GCS service account key and replace the placeholder below:
#        looper encrypt -r AI-INNOVATION-LAB/code-puppy -s "$(base64 < sa-key.json)"
# ============================================================================

tools:
  - python: true

docker:
  - name: "python-agent"
    image: "docker.ci.artifacts.walmart.com/devtools-docker-prod-local/python-looper-agent:3.12-main"

envs:
  global:
    variables:
      BRANCH_NAME: ""
      BRANCH_NAME_LOWERCASE: ""
      BUILD_STATUS: ""
      COMMIT_USER: ""
      ALLOW_ARTIFACTORY: true
      GCS_SA_KEY_B64: ENC[]

  build_success:
    variables:
      BUILD_STATUS: ":looper-green:"

  build_failed:
    variables:
      BUILD_STATUS: ":looper-red:"

rules:
  before:
    - var(BRANCH_NAME): '%{TRIGGER_BRANCH.replaceAll(".+/","")}'
    - var(BRANCH_NAME_LOWERCASE): "%{BRANCH_NAME.toLowerCase()}"
    # COMMIT_USER intentionally left unset (default is ""). The natural way
    # to populate it -- `git log -1 --format="%aN"` in the `before` block --
    # explodes on the vs2022 agent because cmd.exe eats the `%` chars and
    # returns exit 128, killing the build before the Windows step starts.
    # Slack message renders "User: " (blank) instead. Acceptable trade.
    # If we ever want it back, set COMMIT_USER inside the docker/python-agent
    # block instead of the global `before` rule so vs2022 never sees it.
    # - var(COMMIT_USER): git log -1 --format="%aN"

triggers:
  - push:
      ignoreMessage:
        - .+\*{3}NO_CI\*{3}.*
      ignoreAuthor:
        - jenkinspan
  - manual:
      name: manual_release
      call: manual_release()
  - manual:
      name: backfill_artifactory
      call: backfill()
      parameters:
        - githubToken: { type: string }

flows:
  # ---------------------------------------------------------------------------
  # One-time backfill: copy all GitHub releases → Artifactory generic repo
  # Trigger manually from Looper UI. ALLOW_ARTIFACTORY injects TWINE_USERNAME,
  # TWINE_PASSWORD, and REPOSOLNS_GENERIC_RELEASE_REPO automatically.
  # Pass your GHE personal access token as the GITHUB_ACCESS_KEY parameter.
  # ---------------------------------------------------------------------------
  backfill:
    - node(docker-daemon):
        - dockerAgent(python-agent):
            - shell: |
                pip install --quiet \
                  --index-url https://pypi.ci.artifacts.walmart.com/artifactory/api/pypi/external-pypi/simple \
                  httpx
            - shell: |
                echo "=== Backfill: GitHub → Artifactory ==="
                echo "GitHub token set: $([ -n "$GITHUB_ACCESS_KEY" ] && echo yes || echo NO)"
                echo "Artifactory user: $TWINE_USERNAME"
                echo "Artifactory repo: $REPOSOLNS_GENERIC_RELEASE_REPO"
                GITHUB_ACCESS_KEY=${githubToken} python scripts/backfill_gh_to_artifactory.py

  default:
    - node(docker-daemon):
        - dockerAgent(python-agent):
            - call: python_flow()

  # ---------------------------------------------------------------------------
  # Manual release: publish wheel -> build Windows portable venv -> flip latest
  #
  # Three phases, in order:
  #   1. python-agent (linux): bump patch version, build & publish wheel to
  #      Artifactory, commit version bump back to repo, slack the team.
  #   2. vs2022:               build Windows portable venv from the freshly
  #                            published wheel, upload zip to GCS.
  #   3. python-agent (linux): atomically flip the latest/version.txt pointer
  #                            so puppy-backend serves the new venv.
  #
  # Phases 1 & 3 were temporarily disabled while we iterated on the vs2022
  # step (Windows build went through 12 rounds before hitting green --
  # base64 SA key parsing, mojibake, etc.). Restored now that Windows is
  # rock-solid. If a future vs2022 regression sends us back into iteration
  # mode, the cleanest move is to disable just phase 3 (the latest pointer)
  # so wheels still publish but users keep seeing the previous venv.
  # ---------------------------------------------------------------------------
  manual_release:
    - node(docker-daemon):
        - dockerAgent(python-agent):
            - shell: pip install --index-url https://pypi.ci.artifacts.walmart.com/artifactory/api/pypi/external-pypi/simple pytest pytest-cov pytest-asyncio build bumpversion twine uv
            - shell: uv --native-tls venv
            - shell: uv --native-tls version --bump patch
            - shell: uv pip install --native-tls -e .
            - call: python_releaseSteps()
            - call: commitVersion()
            - call: slackBuildMessagePython()
    # Build the Windows x86_64 portable venv, then upload to GCS under
    # code-puppy-venv/<VERSION>/.
    - node(vs2022):
        - call: build_and_upload_windows_venv()
    # Once the Windows zip is up, flip the latest pointer so puppy-backend
    # starts serving the new version. Mac arm64 build was dropped - if it
    # ever comes back, gate this step on both jobs again.
    - node(docker-daemon):
        - dockerAgent(python-agent):
            - call: write_venv_latest_pointer()

  python_flow:
    - node(docker-daemon):
        - dockerAgent(python-agent):
            - shell: pip install --index-url https://pypi.ci.artifacts.walmart.com/artifactory/api/pypi/external-pypi/simple pytest pytest-cov pytest-asyncio build bumpversion twine uv
            - shell: uv --native-tls venv
            - shell: uv --native-tls version --bump patch
            - shell: uv pip install --native-tls -e .

  pr:
    - node(docker-daemon):
        - dockerAgent(python-agent):
            - shell: pip install --index-url https://pypi.ci.artifacts.walmart.com/artifactory/api/pypi/external-pypi/simple pytest pytest-cov pytest-asyncio build uv
            - shell: uv --native-tls venv
            - shell: uv pip install --native-tls -e .
            # - shell: uv --native-tls run pytest --cov-report=term-missing --cov-report=xml:coverage-reports/coverage.xml --cov=code_puppy --junitxml=pytest-reports/pytest-summary.xml
            - shell: uv --native-tls build

  python_releaseSteps:
    - shell: uv --native-tls build
    - shell: |
        VERSION=$(uv --native-tls run python -c "import code_puppy; print(code_puppy.__version__)")
        DEST="${REPOSOLNS_GENERIC_RELEASE_REPO}/code-puppy/$VERSION"
        echo "Uploading to: $DEST"
        echo "Auth user: $TWINE_USERNAME"
        for f in dist/*; do
          echo "--- Uploading $(basename $f) ---"
          curl --fail --show-error \
            --user "$TWINE_USERNAME:$TWINE_PASSWORD" \
            --upload-file "$f" \
            "$DEST/$(basename $f)" 2>&1
          echo "Uploaded OK: $(basename $f)"
        done
        echo "All artifacts at: $DEST"

  commitVersion:
    - shell: git add pyproject.toml
    - shell: git commit -m "CI SKIP"
    - shell: git push origin $LOOPER_TARGET_BRANCH

  slackBuildMessagePython:
    - slack.postMessage:
        message: "*_Library Build_*\n
          code-puppy Python library\n
          *Branch*: ${GITHUB_BRANCH_NAME}\n
          *User*: ${COMMIT_USER}\n
          *Status*: ${BUILD_STATUS}"
        channelId: code-puppy-pipelines

  # ---------------------------------------------------------------------------
  # Portable venv build + upload — Windows x86_64
  # Runs on the same `vs2022` agent the puppy-launcher repo uses.
  # All real work lives in scripts/build_and_upload_windows_venv.ps1; this
  # flow is just a thin CMD->PowerShell dispatch. Keeping the logic in a .ps1
  # avoids CMD's early %PATH% expansion inside `if (...)` blocks, which trips
  # over `C:\Program Files\Git\cmd` on the vs2022 agent.
  # ---------------------------------------------------------------------------
  build_and_upload_windows_venv:
    - shell: |
        @echo off
        powershell -ExecutionPolicy Bypass -File scripts\build_and_upload_windows_venv.ps1

  # ---------------------------------------------------------------------------
  # Atomic latest-pointer flip. Runs after the Windows portable venv build
  # succeeds. Reads the version straight from pyproject.toml (this docker
  # agent doesn't have code_puppy installed) and writes
  # code-puppy-venv/latest/version.txt using google-auth + the GCS REST API.
  # No trailing newline.
  # ---------------------------------------------------------------------------
  write_venv_latest_pointer:
    - shell: |
        # NB: this script is run by /bin/sh (dash) on the python-agent
        # docker image, not bash. `set -o pipefail` is a bash-ism that
        # explodes with `Illegal option -o pipefail` on dash, so we use
        # plain `set -eu` -- no critical pipe chains here anyway.
        set -eu

        # ---- Resolve the version (pyproject.toml is the source of truth) ----
        # We deliberately do NOT use `python -c "import code_puppy; print(...)"`
        # here -- this docker agent is a fresh checkout with no editable
        # install, so `importlib.metadata.version("code-puppy")` raises and
        # code_puppy/__init__.py's except branch returns the literal string
        # "0.0.0-dev". Earlier versions of this script trusted that value and
        # would have happily written "0.0.0-dev" to the latest pointer,
        # bricking every installer in prod. (Caught on build #68.)
        VERSION=$(grep -E '^version\s*=' pyproject.toml | head -1 | sed -E 's/.*"([^"]+)".*/\1/')

        # ---- Hard sanity gate: must look like X.Y.Z, refuse anything else --
        # If a future regression sneaks a non-semver value in here, fail loud
        # rather than poison the latest pointer. Two-step check because dash
        # `case` globs aren't real regex -- `[0-9]*.[0-9]*.[0-9]*` alone
        # would happily match "0.0.0-dev" since `*` greedily eats `-dev`.
        # Step 1: reject if ANY character is not a digit or dot.
        # Step 2: require at least the X.Y.Z shape.
        case "$VERSION" in
            *[!0-9.]*)
                echo "ERROR: pyproject.toml version='$VERSION' contains non-digit/non-dot chars." >&2
                echo "       Refusing to flip the latest pointer to a bad value."     >&2
                exit 1
                ;;
        esac
        case "$VERSION" in
            [0-9]*.[0-9]*.[0-9]*) : ;;
            *)
                echo "ERROR: pyproject.toml version='$VERSION' does not look like X.Y.Z." >&2
                echo "       Refusing to flip the latest pointer to a bad value."     >&2
                exit 1
                ;;
        esac
        echo "Writing latest pointer for v$VERSION..."

        # `pip install` (real pip) uses --trusted-host, NOT --allow-insecure-host
        # (that's the uv-pip-only flag and explodes with `no such option`).
        #
        # Use `python3 -m pip` (NOT bare `pip`) to guarantee the install lands
        # in the same interpreter that runs the heredoc below. Build #69 hit
        # ModuleNotFoundError because bare `pip` was python3.12's pip while
        # `python3` resolved to a different interpreter (likely python3.10) --
        # the install "succeeded" in 3s into the wrong site-packages and the
        # heredoc couldn't find requests.
        python3 -m pip install --quiet \
          --index-url https://pypi.ci.artifacts.walmart.com/artifactory/api/pypi/external-pypi/simple \
          --trusted-host pypi.ci.artifacts.walmart.com \
          google-auth requests
        VERSION="$VERSION" python3 - <<'PYEOF'
        import base64, json, os, requests
        from google.oauth2 import service_account
        from google.auth.transport.requests import Request

        sa_info = json.loads(base64.b64decode(os.environ["GCS_SA_KEY_B64"]))
        creds = service_account.Credentials.from_service_account_info(
            sa_info, scopes=["https://www.googleapis.com/auth/devstorage.read_write"]
        )
        creds.refresh(Request())
        version = os.environ["VERSION"]
        r = requests.post(
            "https://storage.googleapis.com/upload/storage/v1/b/puppy-pages/o"
            "?uploadType=media&name=code-puppy-venv/latest/version.txt",
            headers={
                "Authorization": f"Bearer {creds.token}",
                "Content-Type": "text/plain",
            },
            data=version.encode("ascii"),
            proxies={"https": "http://sysproxy.wal-mart.com:8080",
                     "http":  "http://sysproxy.wal-mart.com:8080"},
            timeout=60,
        )
        r.raise_for_status()
        print(f"Wrote code-puppy-venv/latest/version.txt = {version}")
        PYEOF
