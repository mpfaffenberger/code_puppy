tools:
  - python: true

docker:
  - name: "python-agent"
    image: "docker.ci.artifacts.walmart.com/devtools-docker-prod-local/python-looper-agent:3.12-main"

envs:
  global:
    variables:
      BRANCH_NAME: ""
      BRANCH_NAME_LOWERCASE: ""
      BUILD_STATUS: ""
      COMMIT_USER: ""
      ALLOW_ARTIFACTORY: true
      GITHUB_TOKEN: ENC[bpplxnEEn1SfTgxae3jNXDuRcRS9JDbkXYX1kjO2Ke+nGhR1Ctgl9jsqrDhPClX+]

  build_success:
    variables:
      BUILD_STATUS: ":looper-green:"

  build_failed:
    variables:
      BUILD_STATUS: ":looper-red:"

rules:
  before:
    - var(BRANCH_NAME): '%{TRIGGER_BRANCH.replaceAll(".+/","")}'
    - var(BRANCH_NAME_LOWERCASE): "%{BRANCH_NAME.toLowerCase()}"
    - var(COMMIT_USER): git log -1 --format="%aN"

triggers:
  - push:
      ignoreMessage:
        - .+\*{3}NO_CI\*{3}.*
      ignoreAuthor:
        - jenkinspan
  - manual:
      name: manual_release
      call: manual_release()

flows:
  default:
    - node(docker-daemon):
        - dockerAgent(python-agent):
            - call: python_flow()

  manual_release:
    - node(docker-daemon):
        - dockerAgent(python-agent):
            - shell: pip install --index-url https://pypi.ci.artifacts.walmart.com/artifactory/api/pypi/external-pypi/simple pytest pytest-cov pytest-asyncio build bumpversion twine uv
            - shell: uv --native-tls venv
            - shell: uv --native-tls version --bump patch
            - shell: uv pip install --native-tls -e .
            - call: pre_commit
            # - shell: uv --native-tls run pytest --cov-report=term-missing --cov-report=xml:coverage-reports/coverage.xml --cov=code_puppy --junitxml=pytest-reports/pytest-summary.xml
            - call: python_releaseSteps()
            - call: commitVersion()
            - call: slackBuildMessagePython()

  python_flow:
    - node(docker-daemon):
        - dockerAgent(python-agent):
            - shell: pip install --index-url https://pypi.ci.artifacts.walmart.com/artifactory/api/pypi/external-pypi/simple pytest pytest-cov pytest-asyncio build bumpversion twine uv
            - shell: uv --native-tls venv
            - shell: uv --native-tls version --bump patch
            - shell: uv pip install --native-tls -e .
            - call: pre_commit


  pr:
    - node(docker-daemon):
        - dockerAgent(python-agent):
            - shell: pip install --index-url https://pypi.ci.artifacts.walmart.com/artifactory/api/pypi/external-pypi/simple pytest pytest-cov pytest-asyncio build uv
            - shell: uv --native-tls venv
            - shell: uv pip install --native-tls -e .
            # - shell: uv --native-tls run pytest --cov-report=term-missing --cov-report=xml:coverage-reports/coverage.xml --cov=code_puppy --junitxml=pytest-reports/pytest-summary.xml
            - shell: uv --native-tls build
            - call: pre_commit

  ### Functions ###
  pre_commit:
    - shell: uv tool install pre-commit --with pre-commit-uv
    - shell: git config --unset-all core.hooksPath
    - shell: uv --native-tls run pre-commit install
    - shell: uv --native-tls run pre-commit run --all-files

  python_releaseSteps:
    - shell: uv --native-tls build
    - shell: |
        # Install GitHub CLI via direct download (more reliable in Docker)
        curl -fsSL https://github.com/cli/cli/releases/download/v2.40.1/gh_2.40.1_linux_amd64.tar.gz -o gh.tar.gz
        tar -xzf gh.tar.gz
        # Add gh to PATH for this session instead of using sudo
        export PATH="$PWD/gh_2.40.1_linux_amd64/bin:$PATH"
    - shell: |
        # Configure gh for GitHub Enterprise and use local gh binary
        export PATH="$PWD/gh_2.40.1_linux_amd64/bin:$PATH"
        export GH_HOST=gecgithub01.walmart.com
        # Authenticate with GitHub using the token
        echo "${GITHUB_TOKEN}" | gh auth login --with-token
        VERSION=$(uv --native-tls run python -c "import code_puppy; print(code_puppy.__version__)")
        gh release create "v$VERSION" dist/*.whl \
          --title "Release v$VERSION" \
          --notes "Automated release of code-puppy v$VERSION" \
          --repo genaica/code-puppy
        # Clean up after release
        rm -rf gh.tar.gz gh_2.40.1_linux_amd64
    # - shell: uv --native-tls run twine upload --repository-url https://pypi.ci.artifacts.walmart.com/artifactory/api/pypi/pythonhosted-pypi-release-remote/simple/ dist/*

  commitVersion:
    - shell: git add pyproject.toml
    - shell: git commit -m "CI SKIP"
    - shell: git push origin $LOOPER_TARGET_BRANCH

  slackBuildMessagePython:
    - slack.postMessage:
        message: "*_Library Build_*\n
          code-puppy Python library\n
          *Branch*: ${GITHUB_BRANCH_NAME}\n
          *User*: ${COMMIT_USER}\n
          *Status*: ${BUILD_STATUS}"
        channelId: gg-gi-walmart-puppy-deployments
