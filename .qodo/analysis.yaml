# Qodo Analysis Configuration for Code Puppy
# Defines how Qodo should analyze and understand this codebase

analysis:
  # Code analysis settings
  code_analysis:
    enabled: true

    # Language-specific analysis
    python:
      enabled: true
      version: "3.10+"

      # Key patterns to look for
      patterns:
        - async_functions
        - type_hints
        - error_handling
        - ai_model_usage
        - api_integrations
        - cli_commands

      # Important modules to analyze
      focus_modules:
        - "code_puppy.main"
        - "code_puppy.models"
        - "code_puppy.cli"
        - "code_puppy.ai"

      # Code quality metrics
      metrics:
        complexity: true
        maintainability: true
        test_coverage: true
        documentation: true

  # AI/ML specific analysis
  ai_ml_analysis:
    enabled: true

    # Model integration patterns
    model_patterns:
      - openai_integration
      - anthropic_integration
      - gemini_integration
      - custom_endpoints
      - rate_limiting
      - error_handling
      - async_operations

    # API usage analysis
    api_analysis:
      - authentication_methods
      - request_patterns
      - response_handling
      - error_recovery
      - timeout_handling

    # Performance considerations
    performance:
      - async_usage
      - caching_strategies
      - rate_limiting
      - connection_pooling

  # Architecture analysis
  architecture:
    enabled: true

    # Component relationships
    components:
      - cli_interface
      - ai_models
      - code_generation
      - configuration
      - logging
      - testing

    # Design patterns
    patterns:
      - factory_pattern
      - strategy_pattern
      - observer_pattern
      - command_pattern

    # Dependencies
    dependency_analysis:
      - external_dependencies
      - internal_modules
      - circular_dependencies
      - unused_imports

  # Security analysis
  security:
    enabled: true

    # Security concerns
    focus_areas:
      - api_key_handling
      - input_validation
      - output_sanitization
      - network_security
      - data_privacy

    # Sensitive patterns
    sensitive_patterns:
      - hardcoded_secrets
      - insecure_requests
      - unvalidated_inputs
      - exposed_endpoints

  # Enterprise compliance
  compliance:
    enabled: true

    # Walmart-specific requirements
    walmart_standards:
      - coding_standards
      - security_protocols
      - documentation_requirements
      - testing_standards

    # License compliance
    licensing:
      - dual_license_tracking
      - dependency_licenses
      - copyright_notices

# Analysis rules and priorities
rules:
  high_priority:
    - "Security vulnerabilities in API key handling"
    - "Missing error handling in AI model calls"
    - "Async/await usage inconsistencies"
    - "Missing type hints in public APIs"
    - "Insufficient test coverage (<95%)"

  medium_priority:
    - "Code complexity in main modules"
    - "Missing documentation for public functions"
    - "Inefficient API usage patterns"
    - "Outdated dependency versions"

  low_priority:
    - "Code style inconsistencies"
    - "Minor performance optimizations"
    - "Documentation formatting"

# Custom analysis for AI code generation tool
ai_tool_specific:
  # Prompt engineering analysis
  prompt_analysis:
    - prompt_structure
    - context_management
    - response_parsing
    - error_handling

  # Model management
  model_management:
    - model_switching
    - fallback_strategies
    - performance_monitoring
    - cost_optimization

  # Code generation quality
  generation_quality:
    - output_validation
    - syntax_checking
    - best_practices
    - security_considerations

# Reporting configuration
reporting:
  formats:
    - markdown
    - json
    - html

  sections:
    - executive_summary
    - security_analysis
    - code_quality
    - architecture_overview
    - ai_ml_insights
    - recommendations

  # Custom metrics for AI tools
  custom_metrics:
    - ai_model_usage_efficiency
    - error_handling_coverage
    - async_operation_performance
    - enterprise_compliance_score

# Integration with existing tools
tool_integration:
  # Use existing configurations
  ruff:
    config_file: "pyproject.toml"
    enabled: true

  pytest:
    config_file: "pyproject.toml"
    enabled: true

  coverage:
    config_file: "pyproject.toml"
    minimum_threshold: 95

  # Custom analysis tools
  custom_tools:
    - name: "AI Model Validator"
      command: "python -m code_puppy.validate_models"
      optional: true

    - name: "Enterprise Compliance Check"
      command: "python -m code_puppy.compliance_check"
      optional: true
