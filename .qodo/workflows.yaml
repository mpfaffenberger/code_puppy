# Qodo Workflows for Code Puppy
# Define common development tasks and automation

workflows:

  # Code quality and testing workflows
  quality_check:
    name: "Full Quality Check"
    description: "Run comprehensive code quality checks"
    steps:
      - name: "Lint with Ruff"
        command: "ruff check ."
        working_directory: "."

      - name: "Format check with Ruff"
        command: "ruff format --check ."
        working_directory: "."

      - name: "Type checking"
        command: "python -m mypy code_puppy --ignore-missing-imports"
        working_directory: "."
        optional: true

      - name: "Run tests with coverage"
        command: "pytest --cov=code_puppy --cov-report=term-missing"
        working_directory: "."

  test_suite:
    name: "Test Suite"
    description: "Run the complete test suite"
    steps:
      - name: "Unit tests"
        command: "pytest tests/ -v"
        working_directory: "."

      - name: "Coverage report"
        command: "pytest --cov=code_puppy --cov-report=html"
        working_directory: "."

  format_code:
    name: "Format Code"
    description: "Auto-format code using Ruff"
    steps:
      - name: "Format Python code"
        command: "ruff format ."
        working_directory: "."

      - name: "Fix linting issues"
        command: "ruff check --fix ."
        working_directory: "."

  # Development workflows
  dev_setup:
    name: "Development Setup"
    description: "Set up development environment"
    steps:
      - name: "Create virtual environment"
        command: "python -m venv .venv"
        working_directory: "."
        optional: true

      - name: "Install dependencies"
        command: "uv pip install -e ."
        working_directory: "."

      - name: "Install dev dependencies"
        command: "uv pip install pytest pytest-cov pytest-asyncio ruff"
        working_directory: "."

  build_package:
    name: "Build Package"
    description: "Build the Python package"
    steps:
      - name: "Clean previous builds"
        command: "rm -rf dist/ build/ *.egg-info"
        working_directory: "."
        optional: true

      - name: "Build package"
        command: "python -m build"
        working_directory: "."

  # AI model testing workflows
  test_models:
    name: "Test AI Models"
    description: "Test AI model integrations"
    steps:
      - name: "Test OpenAI integration"
        command: "python -c \"from code_puppy.main import test_openai_connection; test_openai_connection()\""
        working_directory: "."
        optional: true

      - name: "Test model switching"
        command: "pytest tests/ -k model -v"
        working_directory: "."
        optional: true

  # Security and compliance workflows
  security_check:
    name: "Security Check"
    description: "Run security and compliance checks"
    steps:
      - name: "Check for secrets"
        command: "grep -r \"api_key\\|password\\|secret\" --exclude-dir=.git --exclude-dir=.venv ."
        working_directory: "."
        optional: true

      - name: "Dependency security check"
        command: "pip-audit"
        working_directory: "."
        optional: true

  # Documentation workflows
  docs_check:
    name: "Documentation Check"
    description: "Validate documentation"
    steps:
      - name: "Check README"
        command: "python -c \"import markdown; markdown.markdown(open('README.md').read())\""
        working_directory: "."
        optional: true

      - name: "Validate docstrings"
        command: "python -m pydoc code_puppy"
        working_directory: "."
        optional: true

# Workflow triggers
triggers:
  pre_commit:
    workflows:
      - format_code
      - quality_check

  pre_push:
    workflows:
      - quality_check
      - test_suite
      - security_check

  daily:
    workflows:
      - test_models
      - docs_check

# Custom commands for Qodo
commands:
  puppy_test:
    description: "Quick test of Code Puppy functionality"
    command: "code-puppy \"print hello world in Python\""
    working_directory: "."

  puppy_interactive:
    description: "Start Code Puppy in interactive mode"
    command: "code-puppy --interactive"
    working_directory: "."

  model_list:
    description: "List available AI models"
    command: "python -c \"from code_puppy.main import list_models; list_models()\""
    working_directory: "."
    optional: true
